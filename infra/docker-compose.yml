# CitéVision infra — runtime WSL dockerd ONLY.
# Docker Desktop is FORBIDDEN on this project: conflicting Hyper-V/WSL2 sockets
# and two runtimes make the stack non-reproducible. Start with:
#   bash scripts/_start_dockerd_wsl.sh
services:
  postgres:
    image: postgres:17
    container_name: citevision-v2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-citevision}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_postgres}
      POSTGRES_DB: ${POSTGRES_DB:-citevision}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-citevision}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: citevision-v2-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: citevision-v2-mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_PORT:-1884}:1883"
      - "${MQTT_WS_PORT:-9002}:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/broker/uptime' -C 1 -W 3 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  minio:
    image: minio/minio:latest
    container_name: citevision-v2-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-citevision}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme_minio}
    ports:
      - "${MINIO_API_PORT:-9003}:9000"
      - "${MINIO_CONSOLE_PORT:-9004}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  go2rtc:
    image: alexxit/go2rtc:latest
    container_name: citevision-v2-go2rtc
    restart: unless-stopped
    ports:
      - "${GO2RTC_PORT:-1984}:1984"
      - "${GO2RTC_RTSP_PORT:-8554}:8554"
      - "${GO2RTC_WEBRTC_PORT:-8555}:8555"
      - "${GO2RTC_WEBRTC_PORT:-8555}:8555/udp"
    volumes:
      - ./go2rtc.yaml:/config/go2rtc.yaml
      - ${VIDEOS_PATH:-./data/videos}:/videos:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:1984/api || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable
    container_name: citevision-v2-frigate
    restart: unless-stopped
    profiles:
      - frigate
    # Host network: reach LAN cameras (192.168.x) like ai-engine on WSL — bridge NAT times out RTSP.
    network_mode: host
    volumes:
      - ./frigate-config:/config
      - frigate_recordings:/media/frigate/recordings
      - frigate_clips:/media/frigate/clips
      - ./frigate.base.yaml:/config/frigate.base.yaml:ro
    shm_size: "256mb"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:5000/api/version || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  mailhog:
    image: mailhog/mailhog:latest
    container_name: citevision-v2-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8025/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

  citevision-ocr:
    build:
      context: ./ocr_service
    container_name: citevision-v2-ocr
    restart: unless-stopped
    profiles:
      - ocr
    ports:
      - "${OCR_PORT:-8181}:8181"
    volumes:
      - ocr_models:/models
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8181/healthz || exit 1"]
      interval: 30s
      timeout: 90s
      retries: 5
      start_period: 180s

  minio-init:
    image: minio/mc:latest
    container_name: citevision-v2-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_started
    entrypoint: /bin/sh
    command: /scripts/init-minio.sh
    volumes:
      - ./init-minio.sh:/scripts/init-minio.sh:ro
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-citevision}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changeme_minio}
      MINIO_BUCKET: ${MINIO_BUCKET:-citevision-recordings}

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mosquitto_log:
  minio_data:
  frigate_recordings:
  frigate_clips:
  ocr_models:
