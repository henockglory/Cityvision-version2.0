# CitéVision Frigate config — cameras/zones generated by backend compiler (do not edit by hand).
mqtt:
  enabled: true
  host: citevision-v2-mosquitto
  port: 1883

database:
  path: /media/frigate/frigate.db

# Phase A remédiation: motion-only + short event retain — stop disk fill.
# Do NOT use mode: all / 30d events on demo machines (filled C: ~186 Go historically).
record:
  enabled: true
  retain:
    days: 0
    mode: motion
  events:
    retain:
      default: 1
      mode: motion

snapshots:
  enabled: true
  timestamp: true
  bounding_box: true
  retain:
    default: 1

detect:
  enabled: true
  fps: 5

lpr:
  enabled: false

cameras: {}
