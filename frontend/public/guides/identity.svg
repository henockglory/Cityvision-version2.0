<svg viewBox="0 0 160 100" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Background -->
  <rect x="0" y="0" width="160" height="100" fill="#0f172a" rx="6"/>
  <!-- Camera frame left -->
  <rect x="8" y="12" width="56" height="76" rx="4" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5"/>
  <!-- Person in camera -->
  <circle cx="36" cy="38" r="9" fill="#06b6d4" opacity="0.3" stroke="#06b6d4" stroke-width="1"/>
  <rect x="26" y="48" width="20" height="26" rx="4" fill="#06b6d4" opacity="0.2" stroke="#06b6d4" stroke-width="1"/>
  <!-- Face scan box -->
  <rect x="27" y="29" width="18" height="18" fill="none" stroke="#06b6d4" stroke-width="1" stroke-dasharray="3 2"/>
  <!-- Corner marks on face scan -->
  <path d="M27 33 L27 29 L31 29" stroke="#06b6d4" stroke-width="1.5"/>
  <path d="M41 29 L45 29 L45 33" stroke="#06b6d4" stroke-width="1.5"/>
  <path d="M27 43 L27 47 L31 47" stroke="#06b6d4" stroke-width="1.5"/>
  <path d="M41 47 L45 47 L45 43" stroke="#06b6d4" stroke-width="1.5"/>
  <!-- Arrow right -->
  <path d="M68 50 L92 50" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4 2"/>
  <path d="M88 46 L92 50 L88 54" stroke="#06b6d4" stroke-width="1.5"/>
  <!-- Watchlist / database right -->
  <rect x="96" y="20" width="56" height="60" rx="4" fill="#0f172a" stroke="#06b6d4" stroke-width="1.5"/>
  <!-- DB entries -->
  <rect x="104" y="28" width="40" height="8" rx="2" fill="#06b6d4" opacity="0.2"/>
  <circle cx="108" cy="32" r="4" fill="#06b6d4" opacity="0.5"/>
  <rect x="116" y="30" width="24" height="4" rx="1" fill="#06b6d4" opacity="0.4"/>
  <rect x="104" y="40" width="40" height="8" rx="2" fill="#06b6d4" opacity="0.1"/>
  <circle cx="108" cy="44" r="4" fill="#64748b" opacity="0.5"/>
  <rect x="116" y="42" width="24" height="4" rx="1" fill="#64748b" opacity="0.4"/>
  <!-- Match highlight -->
  <rect x="104" y="52" width="40" height="8" rx="2" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1"/>
  <circle cx="108" cy="56" r="4" fill="#ef4444" opacity="0.7"/>
  <text x="115" y="59" fill="#ef4444" font-size="7" font-weight="bold">MATCH</text>
  <!-- Alert -->
  <circle cx="148" cy="22" r="8" fill="#ef4444" opacity="0.3"/>
  <text x="145" y="26" fill="#ef4444" font-size="9" font-weight="bold">!</text>
</svg>
