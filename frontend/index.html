<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('cv-ui');
          var theme = 'dark';
          if (raw) {
            var parsed = JSON.parse(raw);
            if (parsed && parsed.state && parsed.state.theme) theme = parsed.state.theme;
          }
          document.documentElement.classList.add(theme === 'light' ? 'light' : 'dark');
          if (document.body) {
            document.body.style.background = theme === 'light' ? '#f1f5f9' : '#0c1424';
            document.body.style.color = theme === 'light' ? '#0f172a' : '#e2e8f0';
          }
        } catch (_) {
          document.documentElement.classList.add('dark');
          if (document.body) {
            document.body.style.background = '#0c1424';
            document.body.style.color = '#e2e8f0';
          }
        }
      })();
    </script>
    <style>
      html.dark body { background: #0c1424; color: #e2e8f0; }
      html.light body { background: #f1f5f9; color: #0f172a; }
    </style>
    <title>Citévision v2</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
