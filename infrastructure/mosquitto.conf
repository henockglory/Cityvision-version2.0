listener 1883
allow_anonymous true
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# WebSocket listener for browser clients
listener 9001
protocol websockets

# Topic conventions:
#   cv/detections/{camera_id}  — detection payloads
#   cv/events/{camera_id}      — analytics events
#   cv/health/{component}      — health heartbeats
